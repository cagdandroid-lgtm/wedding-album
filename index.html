<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Düğünümüze Hoş Geldiniz!</title>
    
    <!-- YENİ FONTLAR: Cormorant Garamond (Başlık), Montserrat (Metin), Great Vibes (İmza) -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', sans-serif; 
            background-color: #fdfbf7; 
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 550px;
            background: white;
            padding: 50px 35px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); 
            position: relative; 
        }
        
        h1 {
            font-family: 'Cormorant Garamond', serif; 
            font-size: 2.6rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
            line-height: 1.2;
        }
        
        p {
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 30px;
            color: #7f8c8d;
        }

        /* DAKTİLO İMLECİ ANİMASYONU */
        #typing-text::after {
            content: '|';
            animation: blink 0.8s step-end infinite;
            color: #d4af37; 
            font-weight: bold;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* SVG İKON HİZALAMALARI İÇİN YENİ SINIFLAR */
        .icon {
            display: inline-block;
            vertical-align: middle;
        }
        .btn-icon {
            margin-right: 10px;
        }
        h1 .icon {
            margin-left: 8px;
            margin-bottom: 4px;
            color: #d4af37; 
        }
        
        /* BUTON TASARIMLARI */
        .cloudinary-button {
            background-color: #d4af37; 
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 16px 35px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.35);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        
        .cloudinary-button:hover {
            background-color: #c5a028;
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.45);
        }

        .gallery-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 15px;
            padding: 14px 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: #d4af37;
            background-color: transparent;
            text-decoration: none;
            border: 1.5px solid #d4af37;
            border-radius: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .gallery-button:hover {
            background-color: #fbf8f1;
            transform: translateY(-2px);
        }

        /* FORM VE MESAJ KUTUSU TASARIMI */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            color: #2c3e50;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            resize: vertical;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
        }

        /* ROMANTİK İSİM İMZASI */
        .names {
            font-family: 'Great Vibes', cursive;
            margin-top: 40px;
            font-size: 1.6rem;
            color: #bdc3c7;
        }

        #status-message {
            display: none; margin-top: 25px; padding: 15px; border-radius: 10px; font-weight: 500; font-size: 0.95rem; animation: fadeIn 0.5s ease-in-out;
        }
        .msg-success { background-color: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .msg-warning { background-color: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group input.error { border-color: #e74c3c; animation: shake 0.5s; }
        @keyframes shake { 10%, 90% { transform: translateX(-5px); } 20%, 80% { transform: translateX(5px); } 30%, 50%, 70% { transform: translateX(-3px); } 40%, 60% { transform: translateX(3px); } }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: none; width: 18px; height: 18px; border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; margin-right: 8px; vertical-align: middle; }
        
        .cloudinary-button.loading .spinner { display: inline-block; }
        .cloudinary-button.loading .btn-icon { display: none; } 
        .cloudinary-button.loading { opacity: 0.8; cursor: wait; }

        @media (max-width: 600px) {
            .container { padding: 40px 20px; }
            h1 { font-size: 2.2rem; }
            #typing-text { min-height: 140px; } /* Mobilde kaymayı önlemek için yükseklik arttırıldı */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>
            Hikayemize Bir İz Bırakın 
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon">
                <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
                <circle cx="12" cy="13" r="3"></circle>
            </svg>
        </h1>
        
        <!-- YAZININ ANİMASYONLA GELECEĞİ BOŞ KUTU -->
        <p id="typing-text" style="min-height: 110px;"></p>
        
        <div class="input-group">
            <input type="text" id="guest-name" placeholder="Adınız Soyadınız (Örn: Ayşe & Ali)" />
            <textarea id="guest-message" placeholder="Bize bir not bırakın (İsteğe bağlı)" rows="3"></textarea>
        </div>

        <button id="upload_widget" class="cloudinary-button">
            <span class="spinner"></span>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon btn-icon">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span class="btn-text">Anı Ekle</span>
        </button>

        <a href="galeri.html" class="gallery-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon btn-icon">
                <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
                <circle cx="9" cy="9" r="2"></circle>
                <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
            </svg>
            Anıları Gör
        </a>

        <div id="status-message"></div>

        <div class="names">Seher & Çağdaş ~ 2026</div> 
    </div>

    <script type="text/javascript">
        // --- 1. KISIM: DAKTİLO VE CTRL+A (SİLME) EFEKTİ ---
        const typeTarget = document.getElementById('typing-text');
        
        const part1 = "Gecenin büyüsü sizin yansıttığınız enerjiyle, hikayemiz ise sizin şahitliğinizle tamamlanıyor. Varlığınızla taçlanan bu özel günün en güzel anlarını bir de sizin kadrajınızdan görm...";
        const part2 = "Şaka şaka! İşin aslı; o efsane fotoğraflar WhatsApp'ın insafına kalıp piksellenmesin diye oturup bu siteyi tasarldık :) Ama asıl derdimiz kocaman bir 'sinerji' yaratmak! Ateş, su, toprak ve sizin o harika enerjiniz birleşsin; ortaya hepimizin girip tebessümle bakabileceği dev bir anı havuzu çıksın istiyoruz. Çünkü bu gece en çok sizinle, sizin gözünüzden güzel. Hadi, ilk anıyı ekleyip o sinerjiyi başlatalım!";

        async function runTypewriter() {
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            
            // 1. AŞAMA: Ciddi metni harf harf yaz
            for (let i = 0; i < part1.length; i++) {
                typeTarget.innerHTML += part1.charAt(i);
                await sleep(35); 
            }
            
            // 2. AŞAMA: Duraksama (Misafir okurken birden vazgeçilmiş hissi)
            await sleep(1800); 
            
            // 3. AŞAMA: CTRL + A EFEKTİ (Tüm metni mavi seçim kutusu içine al)
            const currentText = typeTarget.innerHTML;
            typeTarget.innerHTML = `<span style="background-color: #b3d4fc; color: #000; border-radius: 2px;">${currentText}</span>`;
            
            // Metin seçili halde yarım saniye beklesin (Kullanıcının gözü algılasın)
            await sleep(500); 
            
            // 4. AŞAMA: DELETE (Tek seferde acımasızca sil)
            typeTarget.innerHTML = "";
            
            // Yeni metne (part2) başlamadan önce derin bir nefes
            await sleep(500); 
            
            // 5. AŞAMA: Gerçek ve eğlenceli metni yazmaya başla
            for (let i = 0; i < part2.length; i++) {
                typeTarget.innerHTML += part2.charAt(i);
                await sleep(35);
            }
        }
        
        runTypewriter();

        // --- 2. KISIM: CLOUDINARY YÜKLEME MANTIĞI ---
        document.getElementById("upload_widget").addEventListener("click", function(){
            const guestNameInput = document.getElementById("guest-name");
            const guestName = guestNameInput.value.trim();

            if (guestName === "") {
                guestNameInput.classList.add("error");
                setTimeout(() => {
                    guestNameInput.classList.remove("error");
                }, 600);
                return; 
            }

            const btn = document.getElementById("upload_widget");
            btn.classList.add("loading"); 
            
            const guestMessage = document.getElementById("guest-message").value.trim() || 'Mesaj Yok';
            
            let uploadedFilesCount = 0; 
            const messageBox = document.getElementById("status-message");
            messageBox.style.display = "none";

            cloudinary.openUploadWidget({
                cloudName: 'dwovhmnwy', 
                uploadPreset: 'dugun_fotograflari', 
                tags: ['seher-cagdas-2026'], 
                sources: ['local', 'camera'], 
                multiple: true,
                language: "tr", 
                context: {
                    kimden: guestName,
                    mesaj: guestMessage
                },
                text: {
                    "tr": {
                        "menu": { "files": "Dosyalarım", "camera": "Kamera" },
                        "local": { "browse": "Cihazdan Seç", "main_title": "Fotoğraf Yükle" }
                    }
                },
                styles: { 
                    palette: {
                        window: "#FFFFFF",
                        windowBorder: "#90A0B3",
                        tabIcon: "#d4af37", 
                        menuIcons: "#5A616A",
                        textDark: "#000000",
                        textLight: "#FFFFFF",
                        link:  "#d4af37", 
                        action:  "#d4af37", 
                        inactiveTabIcon: "#0E2F5A",
                        error: "#F44235",
                        inProgress: "#0078FF",
                        complete: "#20B832",
                        sourceBg: "#E4EBF1"
                    }
                }
            }, (error, result) => { 
                if (!error && result && result.event === "success") { 
                    uploadedFilesCount++;
                }
                
                if (result && result.event === "close") {
                    btn.classList.remove("loading"); 
                    
                    if (uploadedFilesCount > 0) {
                        messageBox.innerHTML = "Harika! Birlikte bir anımızı daha ölümsüzleştirdik. Katkınız için çok teşekkür ederiz 🤍";
                        messageBox.className = "msg-success";
                        messageBox.style.display = "block";
                        
                        document.getElementById("guest-name").value = "";
                        document.getElementById("guest-message").value = "";
                    } else {
                        messageBox.innerHTML = "Fotoğraf yüklemekten vazgeçtiniz. Belki daha sonra denemek istersiniz? 😊";
                        messageBox.className = "msg-warning";
                        messageBox.style.display = "block";
                    }
                    
                    setTimeout(() => {
                        messageBox.style.display = "none";
                    }, 6000);
                }
            });
        }, false);
    </script>

</body>
</html>
