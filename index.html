<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anı Merkezimiz <3 </title>
    
    <!-- YENİ FONTLAR: Cormorant Garamond (Başlık), Montserrat (Metin), Great Vibes (İmza) -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', sans-serif; 
            background-color: #FAFAFA; /* Temiz ve porselen beyazı */
            color: #374151;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 550px;
            background: white;
            padding: 50px 35px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); 
            position: relative; 
            transition: filter 0.4s ease;
        }
        
        h1 {
            font-family: 'Cormorant Garamond', serif; 
            font-size: 3.5rem;
            font-weight: 700;
            color: #B81165; /* Zarif ama canlı macenta */
            margin-bottom: 5px;
            line-height: 1.2;
        }
        
        h2 {
            font-family: 'Cormorant Garamond', serif; 
            font-size: 1.8rem;
            font-weight: 600;
            color: #CF4B86; /* Yaban mersini pembesi */
            margin-bottom: 20px;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 30px;
            color: #4B5563; /* Daha dolgun bir alt metin rengi */
        }

        /* DAKTİLO İMLECİ ANİMASYONU */
        #typing-text::after {
            content: '|';
            animation: blink 0.8s step-end infinite;
            color: #CF4B86;
            font-weight: bold;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* ZARİF ÇİZGİ (AYRAÇ) EFEKTİ */
        .elegant-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(207, 75, 134, 0.8), transparent);
            margin: -5px auto 25px auto;
            width: 0%;
            opacity: 0;
            transition: width 1.2s ease-in-out, opacity 1.2s ease-in-out;
        }
        .elegant-divider.show { width: 75%; opacity: 1; }

        /* SVG İKON HİZALAMALARI İÇİN YENİ SINIFLAR */
        .icon {
            display: inline-block;
            vertical-align: middle;
        }
        .btn-icon {
            margin-right: 10px;
        }
        h2 .icon {
            margin-left: 5px;
            margin-bottom: 2px;
            color: #CF4B86; 
        }
        
        /* BUTON TASARIMLARI */
        .cloudinary-button {
            background-color: #F0B3CE; /* Yumuşak bale pembesi */
            color: #B81165;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 16px 35px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(240, 179, 206, 0.45);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        
        .cloudinary-button:hover {
            background-color: #EBA1C1; /* Biraz daha belirgin pembe */
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(240, 179, 206, 0.6);
        }

        .gallery-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 15px;
            padding: 14px 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #B81165;
            background-color: transparent;
            text-decoration: none;
            border: 1.5px solid #F0B3CE;
            border-radius: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .gallery-button:hover {
            background-color: #FFF0F6;
            transform: translateY(-2px);
        }

        /* FORM VE MESAJ KUTUSU TASARIMI */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            color: #111827;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            resize: vertical;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #CF4B86;
            box-shadow: 0 0 0 3px rgba(207, 75, 134, 0.15);
        }

        /* ROMANTİK İSİM İMZASI */
        .names {
            font-family: 'Great Vibes', cursive;
            margin-top: 40px;
            font-size: 1.5rem;
            color: #CF4B86;
        }

        #status-message {
            display: none; 
            margin-top: 25px; 
            padding: 15px; 
            border-radius: 10px; 
            font-weight: 500; 
            font-size: 0.95rem; 
            animation: fadeIn 0.5s ease-in-out;
            position: relative;
            overflow: hidden;
        }
        .msg-success { background-color: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .msg-warning { background-color: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
        
        .progress-bar {
            position: absolute; bottom: 0; left: 0; height: 4px; background-color: currentColor; opacity: 0.4;
            animation: shrinkBar 6s linear forwards;
        }
        @keyframes shrinkBar { from { width: 100%; } to { width: 0%; } }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group input.error { border-color: #e74c3c; animation: shake 0.5s; }
        @keyframes shake { 10%, 90% { transform: translateX(-5px); } 20%, 80% { transform: translateX(5px); } 30%, 50%, 70% { transform: translateX(-3px); } 40%, 60% { transform: translateX(3px); } }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: none; width: 18px; height: 18px; border: 3px solid rgba(184, 17, 101, 0.2); border-radius: 50%; border-top-color: #B81165; animation: spin 1s ease-in-out infinite; margin-right: 8px; vertical-align: middle; }
        
        .cloudinary-button.loading .spinner { display: inline-block; }
        .cloudinary-button.loading .btn-icon { display: none; } 
        .cloudinary-button.loading { opacity: 0.8; cursor: wait; }

        /* CLOUDINARY EKRANI AÇILINCA ARKA PLANI BULANIKLAŞTIRMA */
        body.widget-open .container,
        body.widget-open .particles-container {
            filter: blur(8px);
            pointer-events: none;
        }

        /* UÇUŞAN IŞIK/TOZ TANELERİ EFEKTİ */
        .particles-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden;
            z-index: -1; /* Sayfa elemanlarının arkasında durması için */
            pointer-events: none; /* Tıklamaları engellememesi için */
            transition: filter 0.4s ease;
        }
        .particle {
            position: absolute;
            background-color: #F0B3CE; /* Bale pembesi uçuşan tanecikler */
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* KÖŞELERDE ÇİÇEK ARANJMANLARI */
        .floral-corner {
            position: fixed;
            z-index: -2;
            width: 320px;
            height: 320px;
            pointer-events: none;
        }
        .floral-top-left {
            top: -60px;
            left: -60px;
        }
        .floral-bottom-right {
            bottom: -60px;
            right: -60px;
            transform: rotate(180deg);
        }

        @media (max-width: 600px) {
            .container { padding: 40px 20px; }
            h1 { font-size: 2.8rem; }
            h2 { font-size: 1.5rem; }
            #typing-text { min-height: 140px; } 
            .floral-corner { width: 160px; height: 160px; }
            .floral-top-left { top: -30px; left: -30px; }
            .floral-bottom-right { bottom: -30px; right: -30px; }
        }
    </style>
</head>
<body>

    <!-- KÖŞE ÇİÇEK ARANJMANLARI -->
    <svg class="floral-corner floral-top-left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Canlı yeşil yapraklar -->
        <path d="M40,90 C10,120 -10,180 40,180 C90,180 70,120 40,90 Z" fill="#298A48" opacity="0.9" transform="rotate(-20 40 90)"/>
        <path d="M90,40 C80,0 130,-20 160,10 C190,40 150,60 90,40 Z" fill="#298A48" opacity="0.85" transform="rotate(20 90 40)"/>
        <path d="M30,50 C0,30 10,-10 40,10 C70,30 50,70 30,50 Z" fill="#298A48" opacity="0.9" />
        <path d="M120,110 C100,160 150,190 180,160 C210,130 170,90 120,110 Z" fill="#298A48" opacity="0.8" transform="rotate(-15 120 110)"/>
        <!-- Yaban mersini pembesi şakayıklar -->
        <circle cx="80" cy="80" r="50" fill="#CF4B86" opacity="0.95"/>
        <path d="M80,30 C50,30 30,80 80,130 C130,80 110,30 80,30" fill="#B81165" opacity="0.4"/>
        <circle cx="70" cy="90" r="35" fill="#e0659a" opacity="0.9"/>
        <circle cx="90" cy="70" r="25" fill="#a1285f" opacity="0.8"/>
        <circle cx="80" cy="80" r="15" fill="#f088b4" opacity="0.9"/>
        <circle cx="140" cy="50" r="30" fill="#CF4B86" opacity="0.95"/>
        <circle cx="135" cy="55" r="20" fill="#e0659a" opacity="0.9"/>
        <circle cx="145" cy="45" r="15" fill="#a1285f" opacity="0.8"/>
    </svg>

    <svg class="floral-corner floral-bottom-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M40,90 C10,120 -10,180 40,180 C90,180 70,120 40,90 Z" fill="#298A48" opacity="0.9" transform="rotate(-20 40 90)"/>
        <path d="M90,40 C80,0 130,-20 160,10 C190,40 150,60 90,40 Z" fill="#298A48" opacity="0.85" transform="rotate(20 90 40)"/>
        <path d="M30,50 C0,30 10,-10 40,10 C70,30 50,70 30,50 Z" fill="#298A48" opacity="0.9" />
        <path d="M120,110 C100,160 150,190 180,160 C210,130 170,90 120,110 Z" fill="#298A48" opacity="0.8" transform="rotate(-15 120 110)"/>
        <circle cx="80" cy="80" r="50" fill="#CF4B86" opacity="0.95"/>
        <path d="M80,30 C50,30 30,80 80,130 C130,80 110,30 80,30" fill="#B81165" opacity="0.4"/>
        <circle cx="70" cy="90" r="35" fill="#e0659a" opacity="0.9"/>
        <circle cx="90" cy="70" r="25" fill="#a1285f" opacity="0.8"/>
        <circle cx="80" cy="80" r="15" fill="#f088b4" opacity="0.9"/>
        <circle cx="140" cy="50" r="30" fill="#CF4B86" opacity="0.95"/>
        <circle cx="135" cy="55" r="20" fill="#e0659a" opacity="0.9"/>
        <circle cx="145" cy="45" r="15" fill="#a1285f" opacity="0.8"/>
    </svg>

    <div class="container">
        <h1>
            Seher & Çağdaş
        </h1>
        <h2>
            Hikayemize Bir İz Bırakın
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon">
                <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
                <circle cx="12" cy="13" r="3"></circle>
            </svg>
        </h2>
        
        <!-- YAZININ ANİMASYONLA GELECEĞİ BOŞ KUTU -->
        <p id="typing-text" style="min-height: 110px;"></p>
        <div id="text-divider" class="elegant-divider"></div>
        
        <div class="input-group">
            <input type="text" id="guest-name" placeholder="Adınız Soyadınız (Örn: Ayşe & Ali)" />
            <textarea id="guest-message" placeholder="Bize bir not bırakın (İsteğe bağlı)" rows="3"></textarea>
        </div>

        <button id="upload_widget" class="cloudinary-button">
            <span class="spinner"></span>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon btn-icon">
                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
                <line x1="12" y1="8" x2="12" y2="14"></line>
                <line x1="9" y1="11" x2="15" y2="11"></line>
            </svg>
            <span class="btn-text">Anı Ekle</span>
        </button>

        <a href="galeri.html" class="gallery-button">
            <!-- Albüm/Galeri İkonu -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon btn-icon">
                <path d="M18 22H4a2 2 0 0 1-2-2V6"></path>
                <path d="m22 13-1.296-1.296a2.41 2.41 0 0 0-3.408 0L11 18"></path>
                <circle cx="12" cy="8" r="2"></circle>
                <rect width="16" height="16" x="6" y="2" rx="2"></rect>
            </svg>
            Anıları Gör
        </a>

        <div id="status-message"></div>

        <div class="names">~ 2026 ~</div> 
    </div>

    <script type="text/javascript">
        // --- 1. KISIM: DAKTİLO VE CTRL+A (SİLME) EFEKTİ ---
        const typeTarget = document.getElementById('typing-text');
        
        const part1 = "Gecenin büyüsü sizin yansıttığınız enerjiyle, hikayemiz ise sizin şahitliğinizle tamamlanıyor. Varlığınızla taçlanan bu özel günün en güzel anlarını bir de sizin kadrajınızdan görm...";
        const part2 = "Şaka şaka! İşin aslı; o efsane fotoğraflar WhatsApp'ın insafına kalıp piksellenmesin diye oturup bu siteyi tasarladık :) Ama asıl derdimiz kocaman bir 'sinerji' yaratmak! Ateş, su, toprak ve sizin o harika enerjiniz birleşsin; ortaya hepimizin girip tebessümle bakabileceği dev bir anı havuzu çıksın istiyoruz. Çünkü bu gece en çok sizinle, sizin gözünüzden güzel... Haydi, ilk anıyı ekleyip o sinerjiyi başlatalım!";

        async function runTypewriter() {
            // YENİ: Ziyaretçi bu oturumda animasyonu daha önce izlediyse direkt son metni göster ve çık
            if (sessionStorage.getItem("hasSeenIntro")) {
                typeTarget.innerHTML = part2;
                document.getElementById('text-divider').classList.add('show');
                document.getElementById('guest-name').focus();
                return;
            }

            const sleep = ms => new Promise(r => setTimeout(r, ms));
            
            for (let i = 0; i < part1.length; i++) {
                typeTarget.innerHTML += part1.charAt(i);
                await sleep(35); 
            }
            
            await sleep(1800); 
            
            const currentText = typeTarget.innerHTML;
            typeTarget.innerHTML = `<span style="background-color: #FFF0F6; color: #B81165; border-radius: 2px;">${currentText}</span>`;
            
            await sleep(500); 
            
            typeTarget.innerHTML = "";
            
            await sleep(500); 
            
            for (let i = 0; i < part2.length; i++) {
                typeTarget.innerHTML += part2.charAt(i);
                await sleep(35);
            }
            
            // YENİ: Daktilo efekti tamamen bittikten sonra çizgiyi (ayracı) göster
            await sleep(400); 
            document.getElementById('text-divider').classList.add('show');

            // Animasyonun tamamlandığını tarayıcı oturum hafızasına kaydet
            sessionStorage.setItem("hasSeenIntro", "true");
            
            // YENİ: Animasyon bittikten sonra input alanına otomatik odaklan
            document.getElementById('guest-name').focus();
        }
        
        runTypewriter();

        // --- 2. KISIM: CLOUDINARY YÜKLEME MANTIĞI ---
        document.getElementById("upload_widget").addEventListener("click", function(){
            const guestNameInput = document.getElementById("guest-name");
            const guestName = guestNameInput.value.trim();

            if (guestName === "") {
                guestNameInput.classList.add("error");
                setTimeout(() => {
                    guestNameInput.classList.remove("error");
                }, 600);
                return; 
            }

            // YENİ: Kullanıcının adını galeri sayfasında en üste almak için tarayıcıya (localStorage) kaydediyoruz.
            localStorage.setItem('guestName', guestName);

            const btn = document.getElementById("upload_widget");
            btn.classList.add("loading"); 
            
            const guestMessage = document.getElementById("guest-message").value.trim() || 'Mesaj Yok';
            
            let uploadedFilesCount = 0; 
            const messageBox = document.getElementById("status-message");
            messageBox.style.display = "none";
            
            // Yeni bir yükleme başlatılırsa eski sayacı temizle
            if (window.messageTimeout) clearTimeout(window.messageTimeout);

            // YENİ: Widget açıldığında arka planı yumuşak bir şekilde bulanıklaştır
            document.body.classList.add("widget-open");

            cloudinary.openUploadWidget({
                cloudName: 'dwovhmnwy', 
                uploadPreset: 'dugun_fotograflari', 
                tags: ['seher-cagdas-2026'], 
                sources: ['local', 'camera'], 
                multiple: true,
                language: "tr", 
                context: {
                    kimden: guestName,
                    mesaj: guestMessage
                },
                text: {
                    "tr": {
                        "menu": { "files": "Dosyalarım", "camera": "Kamera" },
                        "local": { "browse": "Cihazdan Seç", "main_title": "Fotoğraf Yükle" }
                    }
                },
                styles: { 
                    palette: {
                        window: "#FFFFFF",
                        windowBorder: "#90A0B3",
                    tabIcon: "#CF4B86", 
                        menuIcons: "#5A616A",
                        textDark: "#000000",
                        textLight: "#FFFFFF",
                    link:  "#B81165", 
                    action:  "#B81165", 
                    inactiveTabIcon: "#F0B3CE",
                        error: "#F44235",
                    inProgress: "#CF4B86",
                    complete: "#298A48",
                    sourceBg: "#FAFAFA"
                    }
                }
            }, (error, result) => { 
                if (!error && result && result.event === "success") { 
                    uploadedFilesCount++;
                }
                
                if (result && result.event === "close") {
                    // YENİ: Widget kapandığında bulanıklığı kaldır
                    document.body.classList.remove("widget-open");
                    
                    btn.classList.remove("loading"); 
                    
                    if (uploadedFilesCount > 0) {
                        messageBox.innerHTML = `Harika! Birlikte bir anımızı daha ölümsüzleştirdik. Katkınız için çok teşekkür ederiz 🤍 <div class="progress-bar"></div>`;
                        messageBox.className = "msg-success";
                        messageBox.style.display = "block";
                        
                        document.getElementById("guest-name").value = "";
                        document.getElementById("guest-message").value = "";
                    } else {
                        messageBox.innerHTML = `Fotoğraf yüklemekten vazgeçtiniz. Belki daha sonra denemek istersiniz? 😊 <div class="progress-bar"></div>`;
                        messageBox.className = "msg-warning";
                        messageBox.style.display = "block";
                    }
                    
                    window.messageTimeout = setTimeout(() => {
                        messageBox.style.display = "none";
                    }, 6000);
                }
            });
        }, false);

        // --- 3. KISIM: UÇUŞAN IŞIK TANELERİ (PARTİKÜL) EFEKTİ ---
        function createParticles() {
            const container = document.createElement('div');
            container.className = 'particles-container';
            document.body.appendChild(container);

            // 25 adet rastgele tanecik oluştur
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Rastgele boyut (2px - 5px arası)
                const size = Math.random() * 3 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // Rastgele yatay konum (%0 - %100 arası)
                particle.style.left = `${Math.random() * 100}vw`;
                
                // Rastgele hız ve ekranda dağınık başlamaları için eksi değerli gecikme
                particle.style.animationDuration = `${Math.random() * 15 + 10}s`; // 10 - 25 saniye arası hız
                particle.style.animationDelay = `-${Math.random() * 20}s`; 
                
                container.appendChild(particle);
            }
        }
        createParticles();
    </script>

</body>
</html>
