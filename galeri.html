<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Düğün Albümümüz - Seher & Çağdaş</title>
    
    <!-- Fonts and Scripts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://product-gallery.cloudinary.com/v1.0/all.js" type="text/javascript"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fdfbf7; 
            color: #4a4a4a;
            padding: 30px 15px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        p {
            font-size: 1rem;
            color: #7f8c8d;
        }

        .info-note {
            font-size: 0.85rem;
            color: #95a5a6;
            margin-top: 15px;
            font-style: italic;
        }

        .back-button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: #d4af37;
            background-color: transparent;
            text-decoration: none;
            border: 2px solid #d4af37;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            background-color: #d4af37;
            color: white;
        }

        /* Gallery container */
        #my-gallery {
            max-width: 1200px;
            margin: 0 auto;
            display: none; /* Başlangıçta gizli */
        }

        /* YÜKLENİYOR... VE BOŞ DURUM STİLLERİ */
        #gallery-placeholder {
            text-align: center;
            padding: 50px 20px;
            color: #7f8c8d;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Düğün Albümümüz 🤍</h1>
        <p>Bu güzel anları bizimle paylaştığınız için sonsuz teşekkürler!</p>
        <a href="index.html" class="back-button">Yeni Fotoğraf Yükle</a>
        <div class="info-note">💡 Not: Yeni yüklenen fotoğrafların burada görünmesi 1-2 dakika sürebilir.</div>
    </div>

    <div id="gallery-placeholder">
        <div class="loader"></div>
        <p>Galerimiz yükleniyor, lütfen bekleyin...</p>
    </div>

    <div id="my-gallery"></div> 

    <script type="text/javascript">
        const myGallery = cloudinary.galleryWidget({
            container: "#my-gallery",
            cloudName: "dwovhmnwy", // Cloud Name'iniz
            mediaAssets: [
                // Galeride gösterilecek fotoğraflar bu etiket ile çekilecek
                { tag: "seher-cagdas-2026" } 
            ],
            displayProps: {
                mode: "expanded", // Klasik yerine masonry (duvar ustası) görünümü
                columns: [2, 3],  // Mobil için 2, daha büyük ekranlar için 3 sütun
                spacing: 15       // Fotoğraflar arası boşluk (piksel)
            },
            zoomProps: { 
                type: "popup",
                transformation: [ // Fotoğraf büyütüldüğünde uygulanacak dönüşümler
                    // Gönderenin Adı Katmanı
                    {
                        overlay: {
                            font_family: 'Playfair Display',
                            font_size: 50,
                            font_weight: '600',
                            text: '$(kimden)' // Context'ten 'kimden' verisini çek
                        },
                        color: '#FFFFFF',
                        effect: 'shadow;x_2;y_2;color_#00000099', // Okunurluk için gölge
                        gravity: 'south_west', // Sol alta konumlandır
                        y: 20,
                        x: 20
                    },
                    // Mesaj Katmanı (sadece mesaj varsa görünür)
                    {
                        if: "ctx:mesaj != 'Mesaj Yok' && ctx:mesaj != ''", // Koşul: Mesaj boş değilse
                        overlay: {
                            font_family: 'Poppins',
                            font_size: 40,
                            font_style: 'italic',
                            text: '"$(mesaj)"' // Context'ten 'mesaj' verisini çek
                        },
                        color: '#FFFFFF',
                        effect: 'shadow;x_2;y_2;color_#00000099',
                        gravity: 'south_west',
                        y: 85, // İsim katmanının üzerine konumlandır
                        x: 20
                    }
                ]
            }
        });

        myGallery.render();

        // --- YENİ: Galeri durum kontrolü ---
        myGallery.on('gallery:rendered', (data) => {
            const placeholder = document.getElementById('gallery-placeholder');
            const galleryContainer = document.getElementById('my-gallery');

            if (data.assets && data.assets.length > 0) {
                // Fotoğraf varsa, yükleyiciyi gizle ve galeriyi göster
                placeholder.style.display = 'none';
                galleryContainer.style.display = 'block';
            } else {
                // Fotoğraf yoksa, yükleyici alanında bir uyarı göster
                placeholder.innerHTML = '<h3>Henüz Anı Biriktiremedik... 😔</h3><p>Galeride hiç fotoğraf yok. İlk anıyı paylaşan siz olun!</p>';
            }
        });
    </script>

</body>
</html>
