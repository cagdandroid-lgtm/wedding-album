<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Düğün Anılarımız - Seher & Çağdaş</title>
    
    <!-- YENİ ZARİF FONTLAR: Cormorant Garamond ve Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Tıklayınca Büyüme Efekti İçin Kütüphane -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #FAFAFA; /* Temiz ve porselen beyazı */
            color: #374151;
            padding: 30px 15px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 700;
            color: #B81165; /* Zarif ama canlı macenta */
            margin-bottom: 10px;
            line-height: 1.2;
        }

        h1 svg {
            color: #CF4B86; /* Yaban mersini pembesi */
            vertical-align: middle;
            margin-bottom: 6px;
            margin-left: 5px;
        }
        
        p { margin-bottom: 25px; color: #4B5563; font-size: 0.95rem; line-height: 1.6; }

        /* YENİ: BUTONLARI YAN YANA GETİRECEK KUTU */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* BUTON TASARIMI (Hem üst hem alt için) */
        .back-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 28px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: #B81165;
            background-color: transparent;
            text-decoration: none;
            border: 1.5px solid #F0B3CE; /* Bale pembesi border */
            border-radius: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .back-button:hover { 
            background-color: #FFF0F6; 
            transform: translateY(-2px); 
        }

        .back-button svg {
            margin-right: 8px;
        }

        /* YÜKLENİYOR EKRANI */
        #gallery-placeholder {
            text-align: center;
            padding: 50px 20px;
            color: #7f8c8d;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #F3F4F6;
            border-top: 5px solid #B81165;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* MASONRY (PINTEREST) STİLİ */
        #masonry-gallery {
            max-width: 1200px;
            margin: 0 auto;
            column-count: 3;
            column-gap: 15px;
        }

        .masonry-item {
            display: block;
            break-inside: avoid;
            margin-bottom: 15px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            cursor: pointer;
        }

.masonry-item img {
            width: 100%;
            display: block;
            /* Hem büyüme hem de renk değişimi için yumuşak bir geçiş (transition) ekledik */
            transition: transform 0.4s ease, filter 0.4s ease; 
            
            /* Sitenin ruhuna uygun, yormayan tatlı bir sepya efekti */
            filter: sepia(25%) contrast(100%) brightness(105%); 
        }

        .masonry-item:hover img {
            transform: scale(1.03); 
            /* Üzerine gelince sihir gibi orijinal renklerine döner */
            filter: sepia(0%) contrast(110%) brightness(100%); 
        }

        /* GÖNDEREN KİŞİ İSMİ ETİKETİ */
        .sender-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            padding: 40px 15px 15px; 
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }
        
        .sender-name {
            display: flex;
            align-items: center;
        }

        .sender-info svg {
            margin-right: 6px;
            color: #CF4B86; 
        }

        .guest-note {
            font-size: 0.8rem;
            font-weight: 400;
            font-style: italic;
            opacity: 0.85;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .time-ago {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 2px;
            font-weight: 400;
        }

        /* LIGHTBOX AÇILDIĞINDA ARKA PLANI BULANIKLAŞTIRMA */
        .header, #masonry-gallery, .bottom-section {
            transition: filter 0.4s ease;
        }
        body.lightbox-open .header,
        body.lightbox-open #masonry-gallery,
        body.lightbox-open .bottom-section,
        body.lightbox-open #scrollTopBtn {
            filter: blur(8px);
            pointer-events: none;
        }
        
        /* LIGHTBOX (TAM EKRAN) ARKA PLAN OVERLAY RENGİ VE ŞEFFAFLIĞI */
        #baguetteBox-overlay {
            background-color: rgba(20, 15, 10, 0.75) !important; /* Arka planı gösterecek şeffaf ve sıcak bir koyu ton */
        }
        
        /* LIGHTBOX İKONLARINI (OKLAR VE ÇARPI) ALTIN RENGİ YAPMA */
        #baguetteBox-overlay .baguetteBox-button svg polyline,
        #baguetteBox-overlay .baguetteBox-button svg g {
            stroke: #CF4B86 !important;
        }

        /* İkonların üzerine gelindiğindeki arkaplanı konseptimize uyarlama */
        #baguetteBox-overlay .baguetteBox-button:hover,
        #baguetteBox-overlay .baguetteBox-button:focus {
            background-color: rgba(207, 75, 134, 0.2) !important;
        }

        /* KULLANICININ KENDİ FOTOĞRAFLARI İÇİN ÖZEL STİL */
        .masonry-item.own-memory {
            box-shadow: 0 0 15px rgba(207, 75, 134, 0.4);
            border: 2px solid #CF4B86;
        }
        
        .own-memory-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #CF4B86;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* ALT BÖLÜM TASARIMI */
        .bottom-section {
            text-align: center;
            margin-top: 50px;
            padding-bottom: 40px;
            display: none; /* Sayfa yüklenene kadar gizli kalacak */
        }

        .bottom-text {
            font-size: 0.95rem;
            color: #4B5563;
            margin-bottom: 15px;
            font-style: italic;
        }

        /* YUKARI ÇIK BUTONU (SCROLL TO TOP) */
        #scrollTopBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99;
            background-color: #F0B3CE; /* Bale pembesi */
            color: #B81165; /* Macenta ikon/metin */
            border: none;
            outline: none;
            cursor: pointer;
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #scrollTopBtn.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #scrollTopBtn:hover {
            background-color: #EBA1C1; /* Daha belirgin bir pembe */
            transform: translateY(-3px);
        }
        
        /* KÖŞELERDE ÇİÇEK ARANJMANLARI */
        .floral-corner {
            position: fixed;
            z-index: -2;
            width: 320px;
            height: 320px;
            pointer-events: none;
        }
        .floral-top-left {
            top: -60px;
            left: -60px;
        }
        .floral-bottom-right {
            bottom: -60px;
            right: -60px;
            transform: rotate(180deg);
        }

        /* MOBİL UYUM */
        @media (max-width: 900px) { #masonry-gallery { column-count: 2; } }
        @media (max-width: 600px) {
            .floral-corner { width: 160px; height: 160px; }
            .floral-top-left { top: -30px; left: -30px; }
            .floral-bottom-right { bottom: -30px; right: -30px; }
        }
        @media (max-width: 500px) { 
            #masonry-gallery { column-count: 1; } 
            #scrollTopBtn { bottom: 20px; right: 20px; padding: 10px; } 
        }
    </style>
</head>

    <div class="header">
        <h1>
            Anılarımız
            <!-- Başlık Galeri SVG İkonu -->
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>

        <div class="action-buttons">

    <!-- FOTOĞRAFLARIN ALTINDAKİ YENİ BUTON ALANI -->

    <!-- Büyütme efekti scripti -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.js"></script>
    
    <script>
        const cloudName = "dwovhmnwy";
        const tag = "seher-cagdas-2026";
        
        // ÖNBELLEK ÇÖZÜMÜ: URL'nin sonuna anlık saati ekleyerek Cloudinary'yi hep taze listeyi vermeye zorluyoruz
        const url = `https://res.cloudinary.com/${cloudName}/image/list/${tag}.json?t=${new Date().getTime()}`;

        // Fotoğrafın üzerine eklenecek zarif mini kamera SVG'si 
        const miniCameraIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>`;

        // Galeri boş olduğunda gösterilecek zarif albüm SVG'si
        const emptyAlbumIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#CF4B86" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 15px; opacity: 0.7;"><path d="M18 22H4a2 2 0 0 1-2-2V6"></path><path d="m22 13-1.296-1.296a2.41 2.41 0 0 0-3.408 0L11 18"></path><circle cx="12" cy="8" r="2"></circle><rect width="16" height="16" x="6" y="2" rx="2"></rect></svg>`;

        // --- SAYFALAMA (PAGINATION) DEĞİŞKENLERİ ---
        let allImages = [];
        let filteredImages = [];
        let showOnlyOwn = false;
        let currentIndex = 0;
        const itemsPerLoad = 10; // Ekrana her otomatik yüklemede kaç fotoğraf geleceği
        let isFetching = false;

        // --- ZAMANI "X ÖNCE" FORMATINA ÇEVİREN FONKSİYON ---
        function timeAgo(dateString) {
            if (!dateString) return "";
            const date = new Date(dateString);
            const now = new Date();
            const diffInSeconds = Math.floor((now - date) / 1000);
            
            if (diffInSeconds < 60) return "az önce";
            const diffInMinutes = Math.floor(diffInSeconds / 60);
            if (diffInMinutes < 60) return `${diffInMinutes} dakika önce`;
            const diffInHours = Math.floor(diffInMinutes / 60);
            if (diffInHours < 24) return `${diffInHours} saat önce`;
            const diffInDays = Math.floor(diffInHours / 24);
            if (diffInDays < 30) return `${diffInDays} gün önce`;
            const diffInMonths = Math.floor(diffInDays / 30);
            return `${diffInMonths} ay önce`;
        }

        // --- SCROLL ANİMASYONU (FADE-IN UP) İÇİN GÖZLEMCİ ---
        const scrollObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    // Aynı anda ekrana giren fotoğraflar için şelale (stagger) etkisi
                    setTimeout(() => {
                        entry.target.classList.add('visible');
                    }, index * 75); // Her fotoğrafa 75 milisaniye gecikme
                    observer.unobserve(entry.target); // Animasyon sadece 1 kere çalışsın
                }
            });
        }, { rootMargin: '0px 0px -30px 0px', threshold: 0.1 });

        // --- INFINITE SCROLL İÇİN GÖZLEMCİ ---
        const infiniteObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && currentIndex < filteredImages.length && !isFetching) {
                isFetching = true;
                setTimeout(() => {
                    renderImages();
                    isFetching = false;
                }, 300); // 300ms yükleniyor (spinner) hissi verip yeni 10 fotoğrafı basar
            }
        }, { rootMargin: '0px 0px 300px 0px' }); // Kullanıcı sayfanın sonuna 300px kala yüklemeyi tetikler

        function renderImages() {
            const gallery = document.getElementById('masonry-gallery');
            const nextImages = filteredImages.slice(currentIndex, currentIndex + itemsPerLoad);
            
            nextImages.forEach(img => {
                const fullResUrl = `https://res.cloudinary.com/${cloudName}/image/upload/v${img.version}/${img.public_id}.${img.format}`;
                // OPTİMİZASYON: w_600'ü w_400 yaptık.
                const optimizedUrl = `https://res.cloudinary.com/${cloudName}/image/upload/w_400,q_auto,f_auto/v${img.version}/${img.public_id}.${img.format}`;
                
                let kimden = "";
                let mesaj = "";
                if(img.context && img.context.custom) {
                    if(img.context.custom.kimden) kimden = img.context.custom.kimden;
                    if(img.context.custom.mesaj && img.context.custom.mesaj !== 'Mesaj Yok') mesaj = img.context.custom.mesaj;
                }
                
                const timeAgoStr = timeAgo(img.created_at);

                const currentUser = localStorage.getItem('guestName');
                const isOwnMemory = (kimden && currentUser && kimden === currentUser);

                const item = document.createElement('a');
                item.href = fullResUrl; 
                item.className = isOwnMemory ? "masonry-item own-memory fade-in-up" : "masonry-item fade-in-up";
                
                // Büyütülmüş mod (Lightbox) için yazıyı oluşturuyoruz
                let captionText = kimden ? `${kimden} tarafından eklendi` : "";
                if (mesaj) { captionText += captionText ? ` | "${mesaj}"` : `"${mesaj}"`; }
                if (timeAgoStr) { captionText += captionText ? ` (${timeAgoStr})` : `(${timeAgoStr})`; }
                if (captionText) { item.setAttribute("data-caption", captionText); }
                
                item.innerHTML = `
                    <img src="${optimizedUrl}" loading="lazy" alt="Düğün Fotoğrafı">
                    ${isOwnMemory ? '<div class="own-memory-badge">Senin Anın ✨</div>' : ''}
                    ${(kimden || mesaj || timeAgoStr) ? `
                        <div class="sender-info">
                            ${kimden ? `<div class="sender-name">${miniCameraIcon} ${kimden}</div>` : ''}
                            ${mesaj ? `<div class="guest-note">"${mesaj}"</div>` : ''}
                            ${timeAgoStr ? `<div class="time-ago">${timeAgoStr}</div>` : ''}
                        </div>
                    ` : ''}
                `;
                
                gallery.appendChild(item);
                
                // Fotoğrafı yukarı süzülme animasyonu için gözlemciye ekle
                scrollObserver.observe(item);
            });

            baguetteBox.run('#masonry-gallery');
            currentIndex += itemsPerLoad;
            
            // Daha yüklenecek fotoğraf kaldıysa spinner'ı göster, yoksa gizle
            const infiniteSpinner = document.getElementById('infinite-spinner');
            if(currentIndex >= filteredImages.length) {
                infiniteSpinner.style.display = 'none';
            } else {
                infiniteSpinner.style.display = 'block';
            }
        }

        fetch(url)
            .then(response => response.json())
            .then(data => {
                // Yükleniyor yazısını gizle, alt kısmı göster
                document.getElementById('gallery-placeholder').style.display = 'none';
                document.getElementById('bottom-section').style.display = 'block'; 
                
                // Tüm listeyi alıyoruz
                allImages = data.resources;
                
                // --- KENDİ EKLEDİĞİ FOTOĞRAFLARI VE EN YENİLERİ ÜSTE ALMA MANTIĞI ---
                const currentUser = localStorage.getItem('guestName');
                allImages.sort((a, b) => {
                    if (currentUser) {
                        const aKimden = (a.context && a.context.custom && a.context.custom.kimden) ? a.context.custom.kimden : "";
                        const bKimden = (b.context && b.context.custom && b.context.custom.kimden) ? b.context.custom.kimden : "";
                        
                        if (aKimden === currentUser && bKimden !== currentUser) return -1; // 'a' kullanıcınınsa öne al
                        if (aKimden !== currentUser && bKimden === currentUser) return 1;  // 'b' kullanıcınınsa öne al
                    }
                    
                    // Tarihe göre sıralama (en yeniler üstte)
                    const dateA = a.created_at ? new Date(a.created_at) : 0;
                    const dateB = b.created_at ? new Date(b.created_at) : 0;
                    return dateB - dateA;
                });

                filteredImages = [...allImages];

                if (currentUser) {
                    const hasOwnPhotos = allImages.some(img => img.context && img.context.custom && img.context.custom.kimden === currentUser);
                    if (hasOwnPhotos) {
                        const filterBtn = document.getElementById('filterOwnBtn');
                        filterBtn.classList.remove('disabled');
                        filterBtn.removeAttribute('title'); // Tooltip'i kaldır
                    filterBtn.style.display = 'inline-flex'; // Butonu görünür yap
                    }
                }

                if(filteredImages.length > 0) {
                    renderImages(); // İlk 15 fotoğrafı ekrana bas
                } else {
                    document.getElementById('gallery-placeholder').style.display = 'block';
                    document.getElementById('gallery-placeholder').innerHTML = `${emptyAlbumIcon}<p>Henüz anı eklenmemiş. İlk izi siz bırakın!</p>`;
                    document.getElementById('bottom-section').style.display = 'none';
                }
            })
            .catch(err => {
                console.error("Hata:", err);
                document.getElementById('gallery-placeholder').style.display = 'block';
                document.getElementById('gallery-placeholder').innerHTML = `${emptyAlbumIcon}<p>Henüz anı eklenmemiş veya liste güncelleniyor. Lütfen daha sonra tekrar deneyin.</p>`;
                document.getElementById('bottom-section').style.display = 'none';
            });

        // --- FİLTRE BUTONU OLAYI ---
        document.getElementById('filterOwnBtn').addEventListener('click', function() {
            if (this.classList.contains('disabled')) return; // Buton devre dışıysa işlem yapma
            
            showOnlyOwn = !showOnlyOwn;
            const currentUser = localStorage.getItem('guestName');
            const btnText = document.getElementById('filterOwnBtnText');
            
            if (showOnlyOwn) {
                btnText.innerText = "Tüm Anılar";
                filteredImages = allImages.filter(img => img.context && img.context.custom && img.context.custom.kimden === currentUser);
            } else {
                btnText.innerText = "Anılarım";
                filteredImages = [...allImages];
            }
            
            document.getElementById('masonry-gallery').innerHTML = ''; // Galeriyi temizle
            currentIndex = 0; // İndeksi başa al
            
            if (filteredImages.length > 0) {
                renderImages();
                document.getElementById('bottom-section').style.display = 'block';
            } else {
                document.getElementById('infinite-spinner').style.display = 'none';
            }
        });

        // Infinite scroll observer'ı, sayfanın altındaki spinner için başlat
        infiniteObserver.observe(document.getElementById('infinite-spinner'));

        // --- YUKARI ÇIK BUTONU MANTIĞI ---
        const topBtn = document.getElementById("scrollTopBtn");

        // Sayfa kaydırıldığında butonu göster/gizle
        window.addEventListener("scroll", () => {
            if (window.pageYOffset > 300) {
                topBtn.classList.add("show");
            } else {
                topBtn.classList.remove("show");
            }
        });

        // Butona tıklandığında yumuşak (smooth) bir şekilde yukarı kaydır
        topBtn.addEventListener("click", () => {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        });
    </script>

</body>
</html>
