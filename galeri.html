<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Düğün Albümümüz - Seher & Çağdaş</title>
    
    <!-- YENİ ZARİF FONTLAR: Cormorant Garamond ve Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Tıklayınca Büyüme Efekti İçin Kütüphane -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fdfbf7; 
            color: #4a4a4a;
            padding: 30px 15px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.6rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        h1 svg {
            color: #d4af37;
            vertical-align: middle;
            margin-bottom: 6px;
            margin-left: 5px;
        }
        
        p { margin-bottom: 25px; color: #7f8c8d; font-size: 0.95rem; line-height: 1.6; }

        /* BUTON TASARIMI (Hem üst hem alt için) */
        .back-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 28px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: #d4af37;
            background-color: transparent;
            text-decoration: none;
            border: 1.5px solid #d4af37;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        
        .back-button:hover { 
            background-color: #fbf8f1; 
            transform: translateY(-2px); 
        }

        .back-button svg {
            margin-right: 8px;
        }

        /* YÜKLENİYOR EKRANI */
        #gallery-placeholder {
            text-align: center;
            padding: 50px 20px;
            color: #7f8c8d;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* MASONRY (PINTEREST) STİLİ */
        #masonry-gallery {
            max-width: 1200px;
            margin: 0 auto;
            column-count: 3;
            column-gap: 15px;
        }

        .masonry-item {
            display: block;
            break-inside: avoid;
            margin-bottom: 15px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            cursor: pointer;
        }

        .masonry-item img {
            width: 100%;
            display: block;
            transition: transform 0.3s ease;
        }

        .masonry-item:hover img {
            transform: scale(1.03); 
        }

        /* GÖNDEREN KİŞİ İSMİ ETİKETİ */
        .sender-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            padding: 30px 15px 15px; 
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
        }
        
        .sender-info svg {
            margin-right: 6px;
            color: #d4af37; 
        }

        /* ALT BÖLÜM TASARIMI */
        .bottom-section {
            text-align: center;
            margin-top: 50px;
            padding-bottom: 40px;
            display: none; /* Sayfa yüklenene kadar gizli kalacak */
        }

        .bottom-text {
            font-size: 0.95rem;
            color: #7f8c8d;
            margin-bottom: 15px;
            font-style: italic;
        }

        /* YUKARI ÇIK BUTONU (SCROLL TO TOP) */
        #scrollTopBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99;
            background-color: #d4af37;
            color: white;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #scrollTopBtn.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #scrollTopBtn:hover {
            background-color: #c5a028;
            transform: translateY(-3px);
        }

        /* MOBİL UYUM */
        @media (max-width: 900px) { #masonry-gallery { column-count: 2; } }
        @media (max-width: 500px) { 
            #masonry-gallery { column-count: 1; } 
            #scrollTopBtn { bottom: 20px; right: 20px; padding: 10px; } /* Mobilde butonu biraz küçülttük */
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>
            Anılarımız
            <!-- Başlık Galeri SVG İkonu -->
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
                <circle cx="9" cy="9" r="2"></circle>
                <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
            </svg>
        </h1>
        <p>Bu güzel anları bizimle paylaştığınız için sonsuz teşekkürler!</p>
        <a href="index.html" class="back-button">
            <!-- Geri Dön / Yükle SVG İkonu -->
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            Yeni Anı Ekle
        </a>
    </div>

    <!-- YÜKLENİYOR KUTUSU -->
    <div id="gallery-placeholder">
        <div class="loader"></div>
        <p>Galerimiz yükleniyor, lütfen bekleyin...</p>
    </div>

    <!-- MASONRY GALERİ KUTUSU -->
    <div id="masonry-gallery"></div> 

    <!-- FOTOĞRAFLARIN ALTINDAKİ YENİ BUTON ALANI -->
    <div class="bottom-section" id="bottom-section">
        <p class="bottom-text">Sizin de eklemek istediğiniz anılarınız var mı?</p>
        <a href="index.html" class="back-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            Yeni Anı Ekle
        </a>
    </div>

    <!-- YUKARI ÇIK BUTONU -->
    <button id="scrollTopBtn" title="Yukarı Çık">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m18 15-6-6-6 6"/>
        </svg>
    </button>

    <!-- Büyütme efekti scripti -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.11.1/baguetteBox.min.js"></script>
    
    <script>
        const cloudName = "dwovhmnwy";
        const tag = "seher-cagdas-2026";
        const url = `https://res.cloudinary.com/${cloudName}/image/list/${tag}.json`;

        // Fotoğrafın üzerine eklenecek zarif mini kamera SVG'si 
        const miniCameraIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                // Yükleniyor yazısını gizle, alt kısmı göster
                document.getElementById('gallery-placeholder').style.display = 'none';
                document.getElementById('bottom-section').style.display = 'block'; 
                
                const gallery = document.getElementById('masonry-gallery');
                
                data.resources.forEach(img => {
                    const fullResUrl = `https://res.cloudinary.com/${cloudName}/image/upload/v${img.version}/${img.public_id}.${img.format}`;
                    const optimizedUrl = `https://res.cloudinary.com/${cloudName}/image/upload/w_600,q_auto,f_auto/v${img.version}/${img.public_id}.${img.format}`;
                    
                    let kimden = "";
                    if(img.context && img.context.custom && img.context.custom.kimden) {
                        kimden = img.context.custom.kimden;
                    }

                    const item = document.createElement('a');
                    item.href = fullResUrl; 
                    item.className = "masonry-item";
                    
                    if(kimden) { item.setAttribute("data-caption", `${kimden} tarafından eklendi`); }
                    
                    item.innerHTML = `
                        <img src="${optimizedUrl}" loading="lazy" alt="Düğün Fotoğrafı">
                        ${kimden ? `<div class="sender-info">${miniCameraIcon} ${kimden}</div>` : ''}
                    `;
                    
                    gallery.appendChild(item);
                });

                baguetteBox.run('#masonry-gallery');
            })
            .catch(err => {
                console.error("Hata:", err);
                document.getElementById('gallery-placeholder').innerHTML = '<p>Henüz fotoğraf yüklenmemiş veya galeride bir sorun oluştu.</p>';
            });

        // --- YUKARI ÇIK BUTONU MANTIĞI ---
        const topBtn = document.getElementById("scrollTopBtn");

        // Sayfa kaydırıldığında butonu göster/gizle
        window.addEventListener("scroll", () => {
            // Eğer 300 pikselden fazla aşağı inildiyse butonu göster
            if (window.pageYOffset > 300) {
                topBtn.classList.add("show");
            } else {
                topBtn.classList.remove("show");
            }
        });

        // Butona tıklandığında yumuşak (smooth) bir şekilde yukarı kaydır
        topBtn.addEventListener("click", () => {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        });
    </script>

</body>
</html>
